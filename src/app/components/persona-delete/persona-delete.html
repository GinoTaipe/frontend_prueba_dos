<div class="container mt-4">
  <h2>Eliminar Persona</h2>

  @if (loading()) {
    <div class="text-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  }

  @if (error() && !loading()) {
    <div class="alert alert-danger">{{ error() }}</div>
    <a routerLink="/personas" class="btn btn-primary">Volver</a>
  }

  @if (persona(); as p) {
    <div class="alert alert-warning">
      <p>¿Estás seguro de eliminar a la siguiente persona?</p>
      <ul>
        <li><strong>Doc. Identidad:</strong> {{ p.docIdentidad }}</li>
        <li><strong>Nombre:</strong> {{ p.nombre }} {{ p.apellido }}</li>
        <li><strong>Email:</strong> {{ p.email }}</li>
      </ul>
    </div>

    <button class="btn btn-danger me-2" (click)="confirmDelete()" [disabled]="deleting()">
      @if (deleting()) {
        Eliminando...
      } @else {
        Confirmar Eliminación
      }
    </button>
    <a routerLink="/personas" class="btn btn-secondary">Cancelar</a>
  }
</div>
