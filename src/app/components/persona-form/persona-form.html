<div class="container mt-4">
  <h2>{{ isEdit ? 'Editar Persona' : 'Nueva Persona' }}</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" class="row g-3 mt-2">
    <div class="col-md-6">
      <label for="docIdentidad" class="form-label">Documento de Identidad</label>
      <input id="docIdentidad" formControlName="docIdentidad" class="form-control" />
    </div>

    <div class="col-md-6">
      <label for="nombre" class="form-label">Nombre</label>
      <input id="nombre" formControlName="nombre" class="form-control" />
    </div>

    <div class="col-md-6">
      <label for="apellido" class="form-label">Apellido</label>
      <input id="apellido" formControlName="apellido" class="form-control" />
    </div>

    <div class="col-md-3">
      <label for="edad" class="form-label">Edad</label>
      <input id="edad" type="number" formControlName="edad" class="form-control" />
    </div>

    <div class="col-md-9">
      <label for="email" class="form-label">Email</label>
      <input id="email" type="email" formControlName="email" class="form-control" />
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-success me-2" [disabled]="form.invalid">
        {{ isEdit ? 'Actualizar' : 'Crear' }}
      </button>
      <a routerLink="/personas" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
